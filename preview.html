<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Mobile – Localizar Professor SENAI</title>
    <style>
        :root { 
            --phone-bg: #0a0a0a; 
            --phone-border: #222; 
            --accent: #E30613;
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body {
            margin: 0; background: radial-gradient(circle at center, #f8f9fa 0%, #e9ecef 100%);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
        }

        .presentation-info { text-align: center; margin-bottom: 30px; animation: fadeIn 1s ease-out; }
        .presentation-info h1 { margin: 0; color: #111; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .presentation-info p { margin: 8px 0 0; color: #666; font-size: 15px; font-weight: 500; }
        
        /* MOLDURA DO CELULAR (iPhone 15 Pro Style) */
        .phone-container {
            position: relative;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .phone-frame {
            position: relative; width: 380px; height: 780px;
            background: var(--phone-bg); border-radius: 55px;
            padding: 10px; 
            box-shadow: 
                0 50px 100px -20px rgba(0,0,0,0.3),
                0 30px 60px -30px rgba(0,0,0,0.4),
                inset 0 0 2px 2px rgba(255,255,255,0.1);
            border: 2px solid #333;
        }

        /* Botões Laterais */
        .btn-side {
            position: absolute; background: #222; width: 3px; border-radius: 2px;
        }
        .btn-power { right: -5px; top: 180px; height: 80px; }
        .btn-vol-up { left: -5px; top: 140px; height: 45px; }
        .btn-vol-down { left: -5px; top: 200px; height: 45px; }

        /* Tela Interna */
        .screen {
            width: 100%; height: 100%; 
            border-radius: 45px; overflow: hidden;
            background: #fff; position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Dynamic Island */
        .dynamic-island {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 110px; height: 30px; background: #000;
            border-radius: 20px; z-index: 100;
            transition: width 0.3s ease;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            scrollbar-width: none;
        }
        iframe::-webkit-scrollbar { display: none; }

        /* Reflexo de Vidro Superior */
        .glass-glare {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 40%);
            pointer-events: none; z-index: 50; border-radius: 45px;
        }

        .home-bar {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 130px; height: 5px; background: rgba(0,0,0,0.2); border-radius: 10px;
            z-index: 60;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="presentation-info">
        <h1>Localizar Professor SENAI</h1>
        <p>Demonstração Mobile • Ambiente de Produção</p>
    </div>

    <div class="phone-container">
        <!-- Botões Físicos -->
        <div class="btn-side btn-power"></div>
        <div class="btn-side btn-vol-up"></div>
        <div class="btn-side btn-vol-down"></div>

        <!-- Estrutura do Telefone -->
        <div class="phone-frame">
            <div class="screen">
                <div class="dynamic-island"></div>
                <div class="glass-glare"></div>
                <iframe src="index.html" id="previewIframe"></iframe>
                <div class="home-bar"></div>
            </div>
        </div>
    </div>

    <script>
        // Pequeno ajuste para garantir que o iframe carregue bem
        window.onload = () => {
            console.log('Preview carregado com sucesso.');
        };
    </script>
</body>
</html>
